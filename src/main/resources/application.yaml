spring:
  application:
    name: TaskTimeTracker
  datasource:
    url: jdbc:postgresql://localhost:5432/cdekDb
    username: postgres
    password: Azazazru228
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        globally_quoted_identifiers: true
  session:
    store-type: none
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    locations: classpath:db/migration
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  metrics:
    export:
      prometheus:
        enabled: true
    distribution:
      percentiles-histogram:
        "[http.server.requests]": true
app:
  jwt:
    secret: "supersecretkeysupersecretkey123456"
    expirationMillis: 2592000000
